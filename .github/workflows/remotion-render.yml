name: 每日口播视频自动渲染

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:
    inputs:
      props_file:
        description: '参数文件名称 (如 props_20260527.json)'
        required: false
        default: 'props_latest.json'
      video_title:
        description: '视频标题'
        required: false
        default: '每日口播视频'

env:
  PROPS_FILE: ${{ github.event.inputs.props_file || 'props_latest.json' }}
  VIDEO_TITLE: ${{ github.event.inputs.video_title || '每日口播视频' }}

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          npm install
          npx remotion browser ensure

      - name: 创建输出目录
        run: mkdir -p out

      - name: 渲染视频
        run: |
          DATE_TAG=$(date +%Y%m%d)
          npx remotion render src/index.tsx MainComposition "out/koubo_${DATE_TAG}.mp4" --props="./${PROPS_FILE}" --log=verbose

      - name: 上传视频产物
        uses: actions/upload-artifact@v4
        with:
          name: koubo-video-${{ github.run_id }}
          path: out/*.mp4
          retention-days: 30

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: pip install requests

      - name: 推送钉钉通知
        env:
          VIDEO_DIR: ./out
          VIDEO_TITLE: ${{ env.VIDEO_TITLE }}
        run: python send_video.py
