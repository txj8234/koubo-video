name: 每日口播视频自动渲染

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      props_file:
        description: '参数文件名称'
        required: false
        default: 'props_latest.json'
      video_title:
        description: '视频标题'
        required: false
        default: '每日口播视频'

env:
  PROPS_FILE: ${{ github.event.inputs.props_file || 'props_latest.json' }}

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx remotion browser ensure
      - run: mkdir -p out
      - run: |
          DATE_TAG=$(date +%Y%m%d)
          npx remotion render src/index.tsx MainComposition "out/koubo_${DATE_TAG}.mp4" --props="./${PROPS_FILE}" --log=verbose
      - uses: actions/upload-artifact@v4
        with:
          name: koubo-video-${{ github.run_id }}
          path: out/*.mp4
          retention-days: 30
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python send_video.py
        env:
          VIDEO_DIR: ./out
