name: 每日口播视频自动渲染

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          npm install
          pip install requests edge-tts

      - name: 自动生成当日文案与语音
        run: |
          python generate_topic.py

      - name: 复制语音文件到 public 目录
        run: |
          mkdir -p public
          cp voiceover.mp3 public/voiceover.mp3 || echo "⚠️ 语音文件不存在，跳过"

      - name: 渲染视频
        run: npx remotion render src/index.tsx MainComposition out/koubo_latest.mp4 --props=./props_latest.json

      - name: 上传视频产物
        uses: actions/upload-artifact@v4
        with:
          name: koubo-video
          path: out/koubo_latest.mp4
          retention-days: 30

      - name: 推送至钉钉群
        run: python send_video.py
